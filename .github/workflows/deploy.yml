name: Update Jailbreak Repo

on:
  push:
    branches:
      - main
    paths:
      - 'debs/**' # 只有当 debs 文件夹内有变动时才触发，避免无限循环构建
  workflow_dispatch: # 允许手动点击触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 安装 APT 打包工具
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg-dev bzip2 xz-utils

    - name: 生成 Packages 索引文件
      run: |
        # 扫描 debs 目录并生成标准的 Packages 文件
        dpkg-scanpackages -m debs /dev/null > Packages
        
        # 压缩生成各种越狱包管理器需要的格式
        gzip -c9 Packages > Packages.gz
        bzip2 -c9 Packages > Packages.bz2
        xz -c9 Packages > Packages.xz

    - name: 生成 Release 元数据文件
      run: |
        echo "Origin: iZJ777 Repo" > Release
        echo "Label: iZJ777 Repo" >> Release
        echo "Suite: stable" >> Release
        echo "Version: 1.0" >> Release
        echo "Codename: ios" >> Release
        echo "Architectures: iphoneos-arm iphoneos-arm64" >> Release
        echo "Components: main" >> Release
        echo "Description: iZJ777 的个人越狱源" >> Release

    - name: 提交并推送到仓库
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add Packages Packages.gz Packages.bz2 Packages.xz Release
        
        # 检查是否有文件变动，有则提交并打上 [skip ci] 防止触发自身
        if ! git diff-index --quiet HEAD; then
          git commit -m "自动更新源索引文件 [skip ci]"
          git push origin main
        fi
